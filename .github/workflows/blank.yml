name: Sync Image to Aliyun  Example
 
on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main"]
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
    - name: Git pull
      uses: actions/checkout
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action
      
    - name: Login to Docker Hub
      uses: docker/login-action

      with:
        registry: registry.cn-hangzhou.aliyuncs.com #注意这里
        username: dachangren
        password: Qwe!234567
        logout:  false
        
    - name: Use Skopeo Tools Sync Image to Docker Hub
      run: |
         skopeo copy docker://openmetadata/openmetadata:1.12.6 
         docker://registry.cn-hangzhou.aliyuncs.com/dachang_ren/openmetadata:1.12.6
      # 使用 skopeo 工具将镜像同步到阿里云个人仓库中，使用时请自行源和目标修改仓库名称和镜像名称
 
